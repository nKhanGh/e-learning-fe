<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>

  <!-- Outer ring gradient -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.8"/>

  <!-- Head/face body -->
  <rect x="28" y="35" width="64" height="56" rx="18" ry="18" fill="url(#face)" stroke="#00d4ff" stroke-width="0.8" opacity="0.9"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <rect x="36" y="50" width="18" height="10" rx="5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
  <!-- Right eye -->
  <rect x="66" y="50" width="18" height="10" rx="5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>

  <!-- Eye glow dots -->
  <circle cx="45" cy="55" r="3" fill="white" opacity="0.7"/>
  <circle cx="75" cy="55" r="3" fill="white" opacity="0.7"/>

  <!-- Mouth / signal bars -->
  <rect x="40" y="72" width="6" height="9" rx="2" fill="#7b2ff7" opacity="0.9"/>
  <rect x="50" y="68" width="6" height="13" rx="2" fill="#00d4ff" opacity="0.9"/>
  <rect x="60" y="64" width="6" height="17" rx="2" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <rect x="70" y="68" width="6" height="13" rx="2" fill="#00d4ff" opacity="0.9"/>
  <rect x="80" y="72" width="6" height="9" rx="2" fill="#7b2ff7" opacity="0.9"/>

  <!-- Antenna -->
  <line x1="60" y1="35" x2="60" y2="22" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <circle cx="60" cy="19" r="4" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="60" cy="19" r="2" fill="white" opacity="0.8"/>

  <!-- Side details -->
  <rect x="20" y="52" width="8" height="6" rx="3" fill="#7b2ff7" opacity="0.6"/>
  <rect x="92" y="52" width="8" height="6" rx="3" fill="#7b2ff7" opacity="0.6"/>
</svg>
